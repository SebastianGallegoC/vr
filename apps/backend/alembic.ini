# ============================================================
# Alembic Configuration - VegasDelRio
# ============================================================

[alembic]
# Ruta a la carpeta de migraciones
script_location = alembic

# Plantilla de nombres de archivos de migración
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# La URL de la BD se configura programáticamente en alembic/env.py
# usando DATABASE_URL_DIRECT (conexión directa, no pooler)
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
